<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Keren</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4rem;
            background: transparent;
            position: relative;
            z-index: 10;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            animation: fadeSlideIn 1s ease forwards;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 1.1rem;
            position: relative;
            transition: color 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            transition: width 0.3s;
        }
        .nav-links a:hover {
            color: #fff;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .header-area {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .header-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(240, 147, 251, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(245, 87, 108, 0.15) 0%, transparent 60%);
            animation: rotateGradient 20s linear infinite;
            z-index: 1;
        }
        @keyframes rotateGradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .header-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeSlideIn 1.2s ease forwards;
        }
        .header-content h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: 3px;
            text-shadow: 0 0 40px rgba(240,147,251,0.4);
        }
        .header-content p {
            font-size: 1.3rem;
            color: #bbb;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(245,87,108,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
        }
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(245,87,108,0.6);
        }
        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 2rem;
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                gap: 1.5rem;
            }
            .header-content h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CoolHeader</div>
        <ul class="nav-links">
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Layanan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>
    <div class="header-area">
        <div class="header-content">
            <h1>Header Keren</h1>
            <p>Tampilan modern dengan gradien dinamis dan efek animasi yang memukau. Cocok untuk website impianmu.</p>
            <a href="#" class="cta-button">Mulai Sekarang</a>
        </div>
    </div>
</body>
</html>
