<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atasan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.5rem;
      color: #667eea;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .card {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
      text-align: left;
    }

    .card p {
      color: #555;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    .btn {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      margin-top: 10px;
    }

    .btn:hover {
      background: #5a6fdb;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 30px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }
      h1 {
        font-size: 1.8rem;
      }
      h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>atasan</h1>
    <h2>Selamat Datang</h2>

    <div class="card">
      <p>
        Ini adalah halaman utama setelah mengganti teks "CoolHeader" menjadi "atasan". 
        Semua perubahan telah diterapkan sesuai permintaan.
      </p>
    </div>

    <div class="card">
      <p>
        Klik tombol di bawah untuk interaksi sederhana.
      </p>
    </div>

    <button class="btn" id="mainBtn">Klik Saya</button>

    <div class="footer">
      &copy; 2025 atasan
    </div>
  </div>

  <script>
    document.getElementById('mainBtn').addEventListener('click', function() {
      alert('Halo dari atasan!');
    });
  </script>
</body>
</html>
